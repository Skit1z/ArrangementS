name: Deploy ArrangementS

# 让 run 标题显示 commit message（workflow_run 触发默认只显示 workflow 名）
run-name: >-
  ${{
    github.event_name == 'workflow_dispatch'
    && format('🚀 手动触发部署 by @{0}', github.actor)
    || format('🚀 {0}', github.event.workflow_run.head_commit.message)
  }}

on:
  workflow_run:
    workflows: ["CI (Code Quality & Testing)"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    # 仅当 CI 通过时才执行部署；手动触发 (workflow_dispatch) 无 conclusion 字段，同样允许执行
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter meeting-scheduler-web exec vite build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend (upload dist)
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_deploy" \
            apps/web/dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/1panel/www/sites/arrangements/

      - name: Deploy backend (pull & restart)
        run: |
          ssh -i ~/.ssh/id_deploy ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /opt/ArrangementS
            git reset --hard HEAD
            git pull origin main
            cd /opt/ArrangementS/apps/api
            /root/.local/bin/uv sync 2>/dev/null || /root/.local/bin/uv pip install -e . 2>/dev/null || true
            find /opt/ArrangementS -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
            systemctl restart arrangements-api
            systemctl restart arrangements-worker
          EOF
